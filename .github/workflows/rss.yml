name: Generate RSS Feed

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Generate RSS
        run: |
          python "Curitiba Cult RSS/curitibacult_rss.py"
          python "O Que Fazer Curitiba RSS/oquefazercwb_rss.py"

      - name: Commit and push if changed
        run: |
          git config --global user.name "rss-bot"
          git config --global user.email "rss@bot.com"
          git add "Curitiba Cult RSS/feed.xml" "O Que Fazer Curitiba RSS/feed.xml"
          git commit -m "Update RSS feeds" || echo "No changes to commit"
          git push